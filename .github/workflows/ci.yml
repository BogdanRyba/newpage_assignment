name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install uv
          uv pip install --system ".[dev]"
      - name: Lint
        run: ruff check . && ruff format --check .
      - name: Types
        run: mypy app
      - name: Tests (deterministic — cassette replay, no live services)
        env:
          CASSETTE_MODE: replay
          EMBEDDING_PROVIDER: local
        run: pytest -m "not integration" -q

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ariadne
          POSTGRES_PASSWORD: ariadne
          POSTGRES_DB: ariadne
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ariadne" --health-interval 5s
          --health-timeout 3s --health-retries 15
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports: ["6333:6333"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+asyncpg://ariadne:ariadne@localhost:5432/ariadne
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379/0
      EMBEDDING_PROVIDER: local
      CASSETTE_MODE: replay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install uv
          uv pip install --system ".[dev]"
      - name: Migrate
        run: alembic upgrade head
      - name: Integration tests (real Postgres + Qdrant, offline LLM via cassettes)
        run: pytest -m integration -q
      - name: Eval gate (recall@k / MRR / faithfulness / citation-validity)
        run: python -m evals.run --check-thresholds

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run test
      - run: npm run build
