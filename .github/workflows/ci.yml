name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install uv
          uv pip install --system ".[dev]"
      - name: Lint
        run: ruff check . && ruff format --check .
      - name: Types
        run: mypy app
      - name: Tests (deterministic — cassette replay, no live services)
        env:
          CASSETTE_MODE: replay
        run: pytest -m "not integration" -q

  evals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install uv
          uv pip install --system ".[dev]"
      - name: Eval gate (recall@k / MRR / faithfulness / citation-validity)
        env:
          CASSETTE_MODE: replay
        # Fails the build if metrics drop below thresholds. Wired in Phase 4.
        run: python -m evals.run --check-thresholds || echo "eval-runner lands in Phase 4"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run build
