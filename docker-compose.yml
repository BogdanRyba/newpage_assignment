name: ariadne

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://ariadne:ariadne@postgres:5432/ariadne
  QDRANT_URL: http://qdrant:6333
  REDIS_URL: redis://redis:6379/0
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-models/gemini-embedding-001}
  LLM_MODEL: ${LLM_MODEL:-gemini-3.5-flash}
  VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
  RERANK_ENABLED: ${RERANK_ENABLED:-false}
  TOP_K: ${TOP_K:-8}
  RETRIEVE_LIMIT: ${RETRIEVE_LIMIT:-40}
  CASSETTE_MODE: ${CASSETTE_MODE:-off}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  OTEL_ENABLED: ${OTEL_ENABLED:-true}
  LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-}
  LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
  GRAPH_ENABLED: ${GRAPH_ENABLED:-false}
  NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
  NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/ariadnegraph}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ariadne
      POSTGRES_PASSWORD: ariadne
      POSTGRES_DB: ariadne
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ariadne"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrantdata:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: apply migrations before api/worker come up.
  migrate:
    build: ./backend
    command: alembic upgrade head
    environment: *backend-env
    volumes: ["./backend:/app"]
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment: *backend-env
    volumes: ["./backend:/app"]
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build: ./backend
    command: taskiq worker app.ingestion.tasks:broker app.ingestion.tasks --workers 1
    environment: *backend-env
    volumes: ["./backend:/app"]
    depends_on:
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  # One-shot: ingest the bundled sample repo so the demo works immediately.
  seed:
    build: ./backend
    command: python -m app.db.seed
    environment: *backend-env
    volumes: ["./backend:/app"]
    depends_on:
      api: { condition: service_healthy }
      worker: { condition: service_started }
    restart: "no"

  frontend:
    build: ./frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports: ["3000:3000"]
    volumes: ["./frontend:/app", "/app/node_modules", "/app/.next"]
    depends_on:
      api: { condition: service_healthy }

  # Stretch (graph RAG). Disabled by default; enable with:
  #   docker compose --profile graph up
  neo4j:
    image: neo4j:5-community
    profiles: ["graph"]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/ariadnegraph}
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
